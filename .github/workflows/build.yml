name: Build Ege Palas OYS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: EgePalas-OYS-Windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac
        run: npx electron-builder --mac --publish never

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: EgePalas-OYS-Mac
          path: dist/*.dmg
