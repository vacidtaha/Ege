name: Build Ege Palas OYS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Convert PNG to ICO
        run: npx png-to-ico build/icon_win.png > build/icon_win.ico

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: EgePalas-OYS-Windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac
        run: npx electron-builder --mac --publish never

      - name: Ad-hoc Sign App
        run: codesign --force --deep --sign - "dist/mac-arm64/Ege Palas OYS.app"

      - name: Rebuild DMG with signed app
        run: |
          rm -f dist/*.dmg
          hdiutil create -volname "Ege Palas OYS" -srcfolder "dist/mac-arm64/Ege Palas OYS.app" -ov -format UDZO "dist/Ege Palas OYS-1.0.0-arm64.dmg"

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: EgePalas-OYS-Mac
          path: dist/*.dmg
