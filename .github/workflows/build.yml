name: Build Ege Palas OYS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Convert PNG to ICO
        shell: cmd
        run: npx png-to-ico build\icon_win.png > build\icon_win.ico

      - name: Build Windows
        shell: cmd
        run: chcp 65001 && npx electron-builder --win --publish never

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: EgePalas-OYS-Windows
          path: dist/*.exe

  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac ARM64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --arm64 --publish never

      - name: Upload Mac ARM64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: EgePalas-OYS-Mac-ARM64
          path: dist/*.dmg

  build-mac-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --x64 --publish never

      - name: Upload Mac x64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: EgePalas-OYS-Mac-x64
          path: dist/*.dmg
