name: Build Ege Palas OYS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Convert PNG to ICO
        shell: cmd
        run: npx png-to-ico build\icon_win.png > build\icon_win.ico

      - name: Build Windows
        shell: cmd
        run: chcp 65001 && npx electron-builder --win --publish never

      - name: Exclude from Windows Defender
        shell: powershell
        run: |
          $exePath = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1 -ExpandProperty FullName
          if ($exePath) {
            Add-MpPreference -ExclusionPath $exePath -ErrorAction SilentlyContinue
            Write-Host "Defender exclusion added for: $exePath"
          }

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: EgePalas-OYS-Windows
          path: dist/*.exe

  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac ARM64 PKG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --arm64 --publish never

      - name: Upload Mac ARM64 PKG
        uses: actions/upload-artifact@v4
        with:
          name: EgePalas-OYS-Mac-ARM64
          path: dist/*.pkg

  build-mac-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac x64 PKG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --x64 --publish never

      - name: Upload Mac x64 PKG
        uses: actions/upload-artifact@v4
        with:
          name: EgePalas-OYS-Mac-x64
          path: dist/*.pkg
