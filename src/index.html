<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Ege Palas OYS</title>
  <link rel="stylesheet" href="../node_modules/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- macOS için başlık çubuğu sürükleme alanı -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag-region"></div>
    <div class="titlebar-title">Ege Palas Otel Yönetim Sistemi</div>
    <!-- Windows için pencere kontrolleri -->
    <div class="window-controls" id="window-controls">
      <button class="window-control minimize" id="minimize-btn">
        <svg width="12" height="12" viewBox="0 0 12 12">
          <rect fill="currentColor" width="10" height="1" x="1" y="6"></rect>
        </svg>
      </button>
      <button class="window-control maximize" id="maximize-btn">
        <svg width="12" height="12" viewBox="0 0 12 12">
          <rect fill="none" stroke="currentColor" stroke-width="1" width="9" height="9" x="1.5" y="1.5"></rect>
        </svg>
      </button>
      <button class="window-control close" id="close-btn">
        <svg width="12" height="12" viewBox="0 0 12 12">
          <path fill="currentColor" d="M6.707 6l3.146-3.146a.5.5 0 00-.707-.708L6 5.293 2.854 2.146a.5.5 0 10-.708.708L5.293 6l-3.147 3.146a.5.5 0 00.708.708L6 6.707l3.146 3.147a.5.5 0 00.708-.708L6.707 6z"></path>
        </svg>
      </button>
    </div>
  </div>

  <div class="app-container">
    <!-- Sol Menü -->
    <aside class="sidebar" id="sidebar">
      <!-- Otel Adı -->
      <div class="sidebar-header">
        <div class="hotel-info">
          <h1 class="hotel-name">Ege Palas Hotel</h1>
          <span class="hotel-subtitle">Otel Yönetim Sistemi</span>
        </div>
      </div>

      <!-- Navigasyon Menüsü -->
      <nav class="sidebar-nav">
        <ul class="nav-list">
          <!-- Oda Paneli -->
          <li class="nav-item">
            <a href="#" class="nav-link active" data-page="rooms">
              <span class="nav-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 20v-8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8"/>
                  <path d="M5 10V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4"/>
                  <path d="M12 4v6"/>
                  <path d="M3 18h18"/>
                </svg>
              </span>
              <span class="nav-text">Oda Paneli</span>
            </a>
          </li>

          <!-- Rezervasyon Yönetimi -->
          <li class="nav-item">
            <a href="#" class="nav-link" data-page="reservations">
              <span class="nav-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <path d="M16 2v4"/>
                  <path d="M8 2v4"/>
                  <path d="M3 10h18"/>
                  <path d="m9 16 2 2 4-4"/>
                </svg>
              </span>
              <span class="nav-text">Rezervasyonlar</span>
            </a>
          </li>

          <!-- Kat Hizmetleri -->
          <li class="nav-item">
            <a href="#" class="nav-link" data-page="housekeeping">
              <span class="nav-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z"/>
                </svg>
              </span>
              <span class="nav-text">Kat Hizmetleri</span>
            </a>
          </li>

          <!-- EGM Kaydı -->
          <li class="nav-item">
            <a href="#" class="nav-link" data-page="egm">
              <span class="nav-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                  <path d="m9 12 2 2 4-4"/>
                </svg>
              </span>
              <span class="nav-text">EGM Kaydı</span>
              <span class="nav-badge" id="egm-badge" style="display: none;">0</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- Veritabanı Sorgula - En Alt -->
      <div class="sidebar-bottom-nav">
        <a href="#" class="nav-link" data-page="database">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7"/>
              <path d="M20 7c0 2.21-3.582 4-8 4S4 9.21 4 7"/>
              <ellipse cx="12" cy="7" rx="8" ry="4"/>
            </svg>
          </span>
          <span class="nav-text">Veritabanı Sorgula</span>
        </a>
      </div>

      <!-- Kullanıcı Bilgisi -->
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8" fill="none"/>
              <path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
            </svg>
          </div>
          <div class="user-details">
            <span class="user-name">Yönetici</span>
            <span class="user-role">Admin</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Ana İçerik Alanı -->
    <main class="main-content" id="main-content">
      <!-- Sayfa içerikleri buraya yüklenecek -->
      <div class="content-placeholder">
        <div class="placeholder-text">İçerik alanı</div>
      </div>
    </main>
  </div>

  <script src="scripts/renderer.js"></script>
</body>
</html>
